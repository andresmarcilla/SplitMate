    // --- Constantes de Monedas ---
    const CURRENCIES = {
      USD: { symbol: '$', name: 'US Dollar (USD)' },
      EUR: { symbol: '€', name: 'Euro (EUR)' },
      MXN: { symbol: '$', name: 'Peso Mexicano (MXN)' },

      JPY: { symbol: '¥', name: 'Yen Japonés (JPY)' },
    };

    // --- Algoritmo de Simplificación de Deudas ---
    function calculateBalances(tripExpenses, participants) {
      let balances = {};
      participants.forEach(p => balances[p] = 0);

      tripExpenses.forEach(exp => {
        const amountToUse = exp.convertedAmount !== undefined ? Number(exp.convertedAmount) : Number(exp.amount);

        if (balances[exp.paidBy] === undefined) balances[exp.paidBy] = 0;
        balances[exp.paidBy] += amountToUse;

        const splitCount = exp.splitAmong.length;
        if (splitCount > 0) {
          const splitAmount = amountToUse / splitCount;
          exp.splitAmong.forEach(p => {
            if (balances[p] === undefined) balances[p] = 0;
            balances[p] -= splitAmount;
          });
        }
      });

      for (const p in balances) {
        balances[p] = Math.round(balances[p] * 100) / 100;
      }
      return balances;
    }

    function simplifyDebts(balances) {
      let debtors = [];
      let creditors = [];

      for (const [person, amount] of Object.entries(balances)) {
        if (amount < -0.01) debtors.push({ person, amount: -amount });
        if (amount > 0.01) creditors.push({ person, amount });
      }

      debtors.sort((a, b) => b.amount - a.amount);
      creditors.sort((a, b) => b.amount - a.amount);

      let transfers = [];
      let i = 0; 
      let j = 0; 

      while (i < debtors.length && j < creditors.length) {
        let debtor = debtors[i];
        let creditor = creditors[j];

        let minAmount = Math.min(debtor.amount, creditor.amount);
        minAmount = Math.round(minAmount * 100) / 100;

        if (minAmount > 0) {
          transfers.push({
            from: debtor.person,
            to: creditor.person,
            amount: minAmount
          });
        }

        debtor.amount -= minAmount;
        creditor.amount -= minAmount;

        if (debtor.amount < 0.01) i++;
        if (creditor.amount < 0.01) j++;
      }

      return transfers;
    }

    // --- Funciones Auxiliares ---
    function getExpenseIcon(description, isSettlement) {
      if (isSettlement) return '💸';
      const lowerDesc = description.toLowerCase();
      if (/(comida|cena|almuerzo|desayuno|restaurante|bar|cerveza|pizza|sushi|burger|mcdonalds|super|compra)/i.test(lowerDesc)) return '🍔';
      if (/(taxi|uber|cabify|bus|autobus|tren|vuelo|avion|gasolina|peaje|coche|transporte|metro)/i.test(lowerDesc)) return '🚕';
      if (/(hotel|airbnb|hostal|alojamiento|casa)/i.test(lowerDesc)) return '🏨';
      if (/(cine|museo|entrada|ticket|tour|excursion|fiesta|discoteca|copas)/i.test(lowerDesc)) return '🎟️';
      return '🧾';
    }

    function formatDateRange(start, end) {
      if (!start && !end) return null;
      const format = (dStr) => {
        if(!dStr) return '?';
        const [y, m, d] = dStr.split('-');
        return `${d}/${m}/${y.slice(2)}`; 
      };
      if (start && end) return `${format(start)} al ${format(end)}`;
      if (start) return `Desde ${format(start)}`;
      if (end) return `Hasta ${format(end)}`;
      return null;
    }

    function formatDate(dStr) {
      if (!dStr) return '';
      const [y, m, d] = dStr.split('-');
      return `${d}/${m}/${y.slice(2)}`;
    }

    // --- Componente Principal ---
    function App() {
      const [user, setUser] = useState(null);
      const [profileName, setProfileName] = useState(null);
      const [isAuthChecking, setIsAuthChecking] = useState(true);
      const [trips, setTrips] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [currentTripId, setCurrentTripId] = useState(null);
      
      const [showNewTripModal, setShowNewTripModal] = useState(false);
      const [showJoinTripModal, setShowJoinTripModal] = useState(false);
      const [showNewExpenseModal, setShowNewExpenseModal] = useState(false);
      const [expenseToEdit, setExpenseToEdit] = useState(null);
      const [tripToDelete, setTripToDelete] = useState(null);

      // --- Autenticación (GOOGLE AUTH) ---
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            // Usar el nombre de Google, si no hay, usar el correo sin el @dominio
            const name = currentUser.displayName || currentUser.email.split('@')[0];
            setProfileName(name);
          } else {
            setUser(null);
            setProfileName(null);
          }
          setIsAuthChecking(false);
        });
        return () => unsubscribe();
      }, []);

      // --- Obtención de Datos (Firestore) ---
      useEffect(() => {
        if (!user || !profileName) return;

        const tripsRef = collection(db, 'artifacts', appId, 'public', 'data', 'trips');
        const expensesRef = collection(db, 'artifacts', appId, 'public', 'data', 'expenses');

        const unsubTrips = onSnapshot(tripsRef, (snap) => {
          const fetchedTrips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          fetchedTrips.sort((a, b) => {
            const dateA = a.startDate || a.date || new Date(a.createdAt).toISOString().split('T')[0];
            const dateB = b.startDate || b.date || new Date(b.createdAt).toISOString().split('T')[0];
            if (dateA !== dateB) return dateB.localeCompare(dateA);
            return b.createdAt - a.createdAt;
          });
          setTrips(fetchedTrips);
        }, (err) => console.error("Error fetching trips:", err));

        const unsubExpenses = onSnapshot(expensesRef, (snap) => {
          const fetchedExpenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          fetchedExpenses.sort((a, b) => {
            const dateA = a.date || new Date(a.createdAt).toISOString().split('T')[0];
            const dateB = b.date || new Date(b.createdAt).toISOString().split('T')[0];
            if (dateA !== dateB) return dateB.localeCompare(dateA);
            return b.createdAt - a.createdAt;
          });
          setExpenses(fetchedExpenses);
        }, (err) => console.error("Error fetching expenses:", err));

        return () => {
          unsubTrips();
          unsubExpenses();
        };
      }, [user, profileName]);

      // --- Funciones de Gestión ---
      const handleCreateTrip = async (tripData) => {
        if (!user || !profileName) return;
        
        const finalParticipants = [...new Set([...tripData.participants, profileName])];
        const inviteCode = Math.random().toString(36).substring(2, 8).toUpperCase();

        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'trips'), {
          ...tripData,
          participants: finalParticipants,
          inviteCode,
          createdAt: Date.now(),
          createdBy: user.uid
        });
        setShowNewTripModal(false);
      };

      const handleJoinTrip = async (code) => {
        if (!user || !profileName) return;
        try {
          const cleanCode = code.trim().toUpperCase();
          const tripToJoin = trips.find(t => t?.inviteCode === cleanCode);
          
          if (tripToJoin) {
            if (!tripToJoin.participants.includes(profileName)) {
              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripToJoin.id), {
                participants: arrayUnion(profileName)
              });
            }
            setShowJoinTripModal(false);
            setCurrentTripId(tripToJoin.id); 
          } else {
            alert(`No encontramos ningún viaje con el código "${cleanCode}". Por favor, verifica que esté bien escrito.`);
          }
        } catch (error) {
          console.error("Error al unirse al viaje:", error);
          alert("Hubo un error de conexión al intentar unirte. Inténtalo de nuevo.");
        }
      };

      const handleSaveExpense = async (expenseData) => {
        if (!user || !currentTripId) return;
        if (expenseToEdit) {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'expenses', expenseToEdit.id), {
            ...expenseData
          });
        } else {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), {
            ...expenseData,
            tripId: currentTripId,
            createdAt: Date.now(),
            addedBy: user.uid
          });
        }
        setShowNewExpenseModal(false);
        setExpenseToEdit(null);
      };

      const handleSettleDebt = async (transfer) => {
        if (!user || !currentTripId) return;
        const tripToUpdate = trips.find(t => t.id === currentTripId);
        const baseCurrency = tripToUpdate?.baseCurrency || 'USD';

        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), {
          description: `Pago de ${transfer.from} a ${transfer.to}`,
          amount: transfer.amount,
          convertedAmount: transfer.amount,
          currency: baseCurrency,
          exchangeRate: 1,
          date: new Date().toISOString().split('T')[0],
          paidBy: transfer.from,
          splitAmong: [transfer.to],
          isSettlement: true,
          tripId: currentTripId,
          createdAt: Date.now(),
          addedBy: user.uid
        });
      };

      const openEditExpense = (expense) => {
        setExpenseToEdit(expense);
        setShowNewExpenseModal(true);
      };

      const handleDeleteExpense = async (expenseId) => {
        if (!user) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'expenses', expenseId));
      };

      const handleDeleteTrip = async () => {
        if (!user || !tripToDelete) return;
        const relatedExpenses = expenses.filter(e => e.tripId === tripToDelete.id);
        for (const exp of relatedExpenses) {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'expenses', exp.id));
        }
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'trips', tripToDelete.id));
        setTripToDelete(null);
        setCurrentTripId(null);
      };

      const handleLogout = () => {
        signOut(auth).catch(err => console.error("Error cerrando sesión:", err));
      };

      // --- Renderizado ---
      if (isAuthChecking) {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center">
            <div className="animate-pulse flex flex-col items-center">
              <Icon name="Plane" className="w-12 h-12 text-emerald-500 mb-4" />
              <p className="text-slate-500 font-medium">Cargando SplitMate...</p>
            </div>
          </div>
        );
      }

      // Si no hay usuario logueado con Google, mostramos la pantalla de Login
      if (!user) {
        return <LoginScreen />;
      }

      const myTrips = trips.filter(t => t.participants.includes(profileName));
      const currentTrip = trips.find(t => t.id === currentTripId);
      const tripExpenses = expenses.filter(e => e.tripId === currentTripId);

      return (
        <div className="min-h-screen bg-slate-100 font-sans text-slate-900 pb-20">
          <div className="max-w-md mx-auto bg-white min-h-screen shadow-xl relative overflow-hidden">
            
            <header className="bg-emerald-600 text-white p-4 sticky top-0 z-10 shadow-md">
              <div className="flex items-center justify-between">
                {currentTripId ? (
                  <button onClick={() => setCurrentTripId(null)} className="flex items-center text-emerald-50 hover:text-white transition-colors">
                    <Icon name="ChevronLeft" className="w-6 h-6 mr-1" />
                    <span className="font-medium">Volver</span>
                  </button>
                ) : (
                  <div className="flex items-center space-x-2">
                    <Icon name="Plane" className="w-6 h-6" />
                    <h1 className="text-xl font-bold tracking-tight">SplitMate</h1>
                  </div>
                )}
                
                {currentTripId ? (
                  <h1 className="text-lg font-bold truncate max-w-[150px]">{currentTrip?.name}</h1>
                ) : (
                  <div className="flex items-center text-sm font-medium text-emerald-100">
                    <Icon name="Users" className="w-4 h-4 mr-1" /> 
                    <span className="truncate max-w-[100px]">{profileName}</span>
                    <button onClick={handleLogout} className="ml-3 p-1 hover:bg-emerald-700 rounded transition-colors" title="Cerrar sesión">
                      <Icon name="LogOut" className="w-4 h-4 text-emerald-100" />
                    </button>
                  </div>
                )}
              </div>
            </header>

            <main className="p-4">
              {!currentTripId ? (
                <Dashboard 
                  trips={myTrips} 
                  onSelectTrip={setCurrentTripId} 
                  onNewTrip={() => setShowNewTripModal(true)} 
                  onJoinTrip={() => setShowJoinTripModal(true)}
                />
              ) : (
                <TripDetail 
                  trip={currentTrip} 
                  expenses={tripExpenses} 
                  onAddExpense={() => { setExpenseToEdit(null); setShowNewExpenseModal(true); }}
                  onEditExpense={openEditExpense}
                  onDeleteExpense={handleDeleteExpense}
                  onDeleteTrip={() => setTripToDelete(currentTrip)}
                  onSettleDebt={handleSettleDebt}
                />
              )}
            </main>

            {showNewTripModal && (
              <NewTripModal 
                onClose={() => setShowNewTripModal(false)} 
                onSubmit={handleCreateTrip} 
              />
            )}

            {showJoinTripModal && (
              <JoinTripModal 
                onClose={() => setShowJoinTripModal(false)}
                onSubmit={handleJoinTrip}
              />
            )}

            {showNewExpenseModal && currentTrip && (
              <NewExpenseModal 
                trip={currentTrip}
                expenseToEdit={expenseToEdit}
                onClose={() => { setShowNewExpenseModal(false); setExpenseToEdit(null); }} 
                onSubmit={handleSaveExpense} 
              />
            )}

            {tripToDelete && (
              <ConfirmModal 
                title="Eliminar Viaje"
                message={`¿Estás seguro de que quieres eliminar "${tripToDelete.name}"? Esto también borrará todos los gastos asociados. Esta acción no se puede deshacer.`}
                onCancel={() => setTripToDelete(null)}
                onConfirm={handleDeleteTrip}
              />
            )}

          </div>
        </div>
      );
    }

    // --- Pantalla de Inicio de Sesión de Google ---
    function LoginScreen() {
      const [isLoading, setIsLoading] = useState(false);

      const handleGoogleLogin = async () => {
        setIsLoading(true);
        const provider = new GoogleAuthProvider();
        try {
          const authObj = getAuth();
          await signInWithPopup(authObj, provider);
        } catch (error) {
          console.error("Error logging in: ", error);
          alert("Hubo un error al intentar iniciar sesión con Google. Asegúrate de tener las ventanas emergentes permitidas.");
          setIsLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-emerald-600 flex items-center justify-center p-4 font-sans">
          <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl text-center animate-in zoom-in-95 duration-500">
            <div className="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-6 transform rotate-12">
              <Icon name="Plane" className="w-8 h-8 text-emerald-600 -rotate-12" />
            </div>
            <h1 className="text-2xl font-bold text-slate-800 mb-2">¡Bienvenido a SplitMate!</h1>
            <p className="text-slate-500 mb-8 font-medium">Inicia sesión con tu cuenta de Google para organizar tus gastos de viaje.</p>
            
            <button 
              onClick={handleGoogleLogin} 
              disabled={isLoading}
              className="w-full py-4 bg-white border-2 border-slate-200 text-slate-700 font-bold rounded-xl flex items-center justify-center hover:bg-slate-50 transition-colors shadow-sm disabled:opacity-70 disabled:cursor-not-allowed"
            >
              {isLoading ? (
                <span>Cargando...</span>
              ) : (
                <>
                  <svg className="w-5 h-5 mr-3" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                  </svg>
                  Iniciar sesión con Google
                </>
              )}
            </button>
          </div>
        </div>
      );

    function NewTripModal({ onClose, onSubmit }) {
      const [name, setName] = useState('');
      const [baseCurrency, setBaseCurrency] = useState('USD');
      const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
      const [endDate, setEndDate] = useState(() => {
        const d = new Date();
        d.setDate(d.getDate() + 3);
        return d.toISOString().split('T')[0];
      });
      const [participants, setParticipants] = useState(['', '']);
      const [error, setError] = useState('');

      const handleAddParticipant = () => setParticipants([...participants, '']);
      const handleRemoveParticipant = (index) => {
        const newP = [...participants];
        newP.splice(index, 1);
        setParticipants(newP);
      };
      const handleChangeParticipant = (index, value) => {
        const newP = [...participants];
        newP[index] = value;
        setParticipants(newP);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        const cleanParticipants = participants.map(p => p.trim()).filter(p => p !== '');
        if (!name.trim() || cleanParticipants.length < 2) {
          setError("Por favor ingresa un nombre y al menos 2 participantes.");
          return;
        }
        if (startDate && endDate && startDate > endDate) {
          setError("La fecha de inicio no puede ser posterior a la fecha de fin.");
          return;
        }
        const uniqueParticipants = [...new Set(cleanParticipants)];
        onSubmit({ name, baseCurrency, startDate, endDate, participants: uniqueParticipants });
      };

      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center animate-in fade-in duration-200">
          <div className="bg-white w-full max-w-md sm:rounded-3xl rounded-t-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-8 duration-300 max-h-[90vh] overflow-y-auto">
            <h2 className="text-2xl font-bold text-slate-800 mb-6">Crear Nuevo Viaje</h2>
            
            {error && (
              <div className="mb-4 p-3 bg-red-50 text-red-700 rounded-xl flex items-center text-sm font-medium">
                <Icon name="AlertCircle" className="w-4 h-4 mr-2 flex-shrink-0" />
                {error}
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1.5">Nombre del Viaje</label>
                <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Ej. Verano en Madrid" className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-medium text-slate-800 placeholder-slate-400" autoFocus />
              </div>

              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1.5">Moneda Principal del Viaje</label>
                <div className="relative">
                  <Icon name="Globe" className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                  <select value={baseCurrency} onChange={e => setBaseCurrency(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-medium text-slate-800 bg-white appearance-none">
                    {Object.entries(CURRENCIES).map(([code, { name }]) => (
                      <option key={code} value={code}>{name}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div className="flex space-x-3">
                <div className="flex-1">
                  <label className="block text-sm font-bold text-slate-600 mb-1.5">Desde (Opcional)</label>
                  <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl px-3 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-medium text-slate-800 text-sm" />
                </div>
                <div className="flex-1">
                  <label className="block text-sm font-bold text-slate-600 mb-1.5">Hasta (Opcional)</label>
                  <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl px-3 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-medium text-slate-800 text-sm" />
                </div>
              </div>

              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1.5">¿Quiénes van?</label>
                <div className="space-y-2 max-h-48 overflow-y-auto pr-2 pb-2">
                  {participants.map((p, i) => (
                    <div key={i} className="flex items-center space-x-2">
                      <input type="text" value={p} onChange={e => handleChangeParticipant(i, e.target.value)} placeholder={`Persona ${i + 1}`} className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2.5 focus:border-emerald-500 focus:outline-none transition-colors" />

                <button type="button" onClick={handleAddParticipant} className="text-emerald-600 font-bold text-sm mt-3 flex items-center hover:text-emerald-700">
                  <Icon name="Plus" className="w-4 h-4 mr-1" /> Añadir otra persona
                </button>
              </div>

              <div className="pt-4 flex space-x-3">
                <button type="button" onClick={onClose} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>

    function NewExpenseModal({ trip, expenseToEdit, onClose, onSubmit }) {
      const tripCurrency = trip.baseCurrency || 'USD';
      const [description, setDescription] = useState(expenseToEdit ? expenseToEdit.description : '');
      const [amount, setAmount] = useState(expenseToEdit ? expenseToEdit.amount.toString() : '');
      const [date, setDate] = useState(expenseToEdit ? (expenseToEdit.date || new Date().toISOString().split('T')[0]) : new Date().toISOString().split('T')[0]);
      const [currency, setCurrency] = useState(expenseToEdit ? (expenseToEdit.currency || tripCurrency) : tripCurrency);
      const [exchangeRate, setExchangeRate] = useState(expenseToEdit ? (expenseToEdit.exchangeRate || 1) : 1);
      const [isFetchingRate, setIsFetchingRate] = useState(false);
      const [paidBy, setPaidBy] = useState(expenseToEdit ? expenseToEdit.paidBy : trip.participants[0]);
      const [splitAmong, setSplitAmong] = useState(expenseToEdit ? expenseToEdit.splitAmong : [...trip.participants]);
      const [error, setError] = useState('');

      const toggleParticipant = (p) => {
        if (splitAmong.includes(p)) {
          setSplitAmong(splitAmong.filter(x => x !== p));
        } else {
          setSplitAmong([...splitAmong, p]);
        }
      };

      const selectAll = () => setSplitAmong([...trip.participants]);

      const handleCurrencyChange = async (newCurrency) => {
        setCurrency(newCurrency);
        if (newCurrency === tripCurrency) {
          setExchangeRate(1);
          return;
        }
        setIsFetchingRate(true);
        try {
          const res = await fetch(`https://open.er-api.com/v6/latest/${newCurrency}`);
          const data = await res.json();
          const rate = data.rates[tripCurrency];
          if (rate) setExchangeRate(rate);
        } catch (e) {
          console.error("Error fetching rate", e);
        } finally {
          setIsFetchingRate(false);
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        
        const parsedAmount = parseFloat(amount.toString().replace(',', '.'));
        const parsedRate = parseFloat(exchangeRate.toString().replace(',', '.'));

        if (!description.trim() || isNaN(parsedAmount) || parsedAmount <= 0) {
          setError("Por favor ingresa una descripción y cantidad válida.");
          return;
        }
        if (isNaN(parsedRate) || parsedRate <= 0) {
          setError("Por favor ingresa una tasa de cambio válida.");
          return;
        }
        if (splitAmong.length === 0) {
          setError("Al menos una persona debe ser seleccionada para dividir.");
          return;
        }
        
        const convertedAmount = currency === tripCurrency ? parsedAmount : parsedAmount * parsedRate;

        onSubmit({
          description,
          amount: parsedAmount,
          date,
          currency,
          exchangeRate: parsedRate,
          convertedAmount,
          paidBy,
          splitAmong
        });
      };

      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center animate-in fade-in duration-200">
          <div className="bg-white w-full max-w-md sm:rounded-3xl rounded-t-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-8 duration-300 max-h-[90vh] overflow-y-auto">
            <h2 className="text-2xl font-bold text-slate-800 mb-6">{expenseToEdit ? 'Editar Gasto' : 'Añadir Gasto'}</h2>
            
            {error && (
              <div className="mb-4 p-3 bg-red-50 text-red-700 rounded-xl flex items-center text-sm font-medium">
                <Icon name="AlertCircle" className="w-4 h-4 mr-2 flex-shrink-0" />
                {error}
              </div>
            )}
            
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1.5">¿Para qué fue esto?</label>
                <input type="text" value={description} onChange={e => setDescription(e.target.value)} placeholder="Ej. Cena en pizzería" className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 focus:border-emerald-500 focus:outline-none transition-colors text-slate-800 placeholder-slate-400 font-medium" autoFocus />
              </div>

              <div className="flex space-x-3">
                <div className="flex-[2]">
                  <label className="block text-sm font-bold text-slate-600 mb-1.5">¿Cuánto fue?</label>
                  <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">{CURRENCIES[currency]?.symbol || '$'}</span>
                    <input type="text" inputMode="decimal" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0.00" className="w-full border-2 border-slate-200 rounded-xl pl-8 pr-4 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-bold text-slate-800" />
                  </div>
                </div>
                <div className="flex-1">
                  <label className="block text-sm font-bold text-slate-600 mb-1.5">Moneda</label>
                  <select value={currency} onChange={e => handleCurrencyChange(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl px-2 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-medium text-slate-800 bg-white">
                    {Object.keys(CURRENCIES).map((code) => (
                      <option key={code} value={code}>{code}</option>
                    ))}
                  </select>
                </div>
              </div>

              {currency !== tripCurrency && (
                <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 flex flex-col space-y-2">
                  <div className="flex justify-between items-center">
                    <label className="text-xs font-bold text-slate-500 flex items-center">
                      <Icon name="RefreshCw" className={`w-3 h-3 mr-1 ${isFetchingRate ? 'animate-spin' : ''}`} />
                      Tasa de cambio (1 {currency} = X {tripCurrency})
                    </label>
                  </div>
                  <input type="text" inputMode="decimal" value={exchangeRate} onChange={e => setExchangeRate(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:border-emerald-500 focus:outline-none transition-colors text-sm font-medium text-slate-700" />
                  {amount && !isNaN(parseFloat(amount)) && !isNaN(parseFloat(exchangeRate)) && (
                    <p className="text-xs text-emerald-600 font-medium text-right">
                      Total en viaje: {CURRENCIES[tripCurrency]?.symbol}{(parseFloat(amount) * parseFloat(exchangeRate)).toFixed(2)} {tripCurrency}
                    </p>
                  )}
                </div>
              )}

              <div className="flex space-x-3">
                <div className="flex-[2]">
                  <label className="block text-sm font-bold text-slate-600 mb-1.5">¿Quién pagó?</label>
                  <select value={paidBy} onChange={e => setPaidBy(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-medium text-slate-800 bg-white">
                    {trip.participants.map(p => (
                      <option key={p} value={p}>{p}</option>
                    ))}
                  </select>
                </div>
                <div className="flex-1">
                  <label className="block text-sm font-bold text-slate-600 mb-1.5">Fecha</label>
                  <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full border-2 border-slate-200 rounded-xl px-2 py-3 focus:border-emerald-500 focus:outline-none transition-colors font-medium text-slate-800 text-sm" />
                </div>
              </div>

              <div>
                <div className="flex items-center justify-between mb-2">
                  <label className="block text-sm font-bold text-slate-600">Dividir entre</label>
                  <button type="button" onClick={selectAll} className="text-xs text-emerald-600 font-bold hover:underline">
                    Seleccionar Todos
                  </button>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  {trip.participants.map(p => {
                    const isSelected = splitAmong.includes(p);
                    return (
                      <div key={p} onClick={() => toggleParticipant(p)} className={`flex items-center space-x-2 p-3 border-2 rounded-xl cursor-pointer transition-all ${isSelected ? 'border-emerald-500 bg-emerald-50' : 'border-slate-100 bg-white hover:border-slate-200'}`}>
                        {isSelected ? <Icon name="CheckSquare" className="w-5 h-5 text-emerald-500" /> : <Icon name="Square" className="w-5 h-5 text-slate-300" />}
                        <span className={`font-medium text-sm ${isSelected ? 'text-emerald-800' : 'text-slate-600'}`}>{p}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="pt-4 flex space-x-3">
                <button type="button" onClick={onClose} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
                <button type="submit" className="flex-1 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-200">
                  {expenseToEdit ? 'Guardar Cambios' : 'Guardar Gasto'}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function ConfirmModal({ title, message, onCancel, onConfirm }) {
      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center animate-in fade-in duration-200 p-4">
          <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-in zoom-in-95 duration-200">
            <div className="flex items-center text-red-600 mb-4">
              <Icon name="AlertCircle" className="w-6 h-6 mr-2" />
              <h3 className="text-xl font-bold text-slate-800">{title}</h3>
            </div>
            <p className="text-slate-600 mb-6 font-medium">{message}</p>
            <div className="flex space-x-3">
              <button onClick={onCancel} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
              <button onClick={onConfirm} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition-colors shadow-lg shadow-red-200">Eliminar</button>
            </div>
          </div>
        </div>
      );
    }

    function JoinTripModal({ onClose, onSubmit }) {
      const [code, setCode] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (code.trim().length > 0) onSubmit(code.trim());
      };

      return (
        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center animate-in fade-in duration-200">
          <div className="bg-white w-full max-w-md sm:rounded-3xl rounded-t-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-8 duration-300">
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-2xl font-bold text-slate-800">Unirse a un Viaje</h2>
            </div>
            
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-bold text-slate-600 mb-1.5">Código de Invitación</label>
                <input type="text" value={code} onChange={e => setCode(e.target.value.toUpperCase())} placeholder="Ej. ABCDEF" maxLength={8} className="w-full border-2 border-slate-200 rounded-xl px-4 py-4 focus:border-emerald-500 focus:outline-none transition-colors font-mono font-bold text-slate-800 text-center text-2xl tracking-widest uppercase" autoFocus />
                <p className="text-xs text-slate-500 mt-2 text-center">Pídele a quien creó el viaje que te comparta el código.</p>
              </div>
              <div className="pt-2 flex space-x-3">
                <button type="button" onClick={onClose} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
                <button type="submit" className="flex-1 py-3 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-200">Unirse</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // --- Iniciar la aplicación de React ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
